services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: always
    ports:
      - "127.0.0.1:5672:5672"   
      - "127.0.0.1:15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512MB

  redis:
    image: redis:latest
    ports: 
      - "127.0.0.1:6379:6379" 
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

volumes:
  rabbitmq_data:
